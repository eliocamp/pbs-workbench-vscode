name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package
        run: npx vsce package --out pbs-workbench.vsix

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: 'pbs-workbench.vsix'